[SERVICE]
    Flush        5
    Log_Level    warn
    Daemon       off
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name         tail
    Path         /data/querylog.json
    Tag          adguard.querylog
    Parser       json
    Refresh_Interval 10
    Read_from_Head false

[OUTPUT]
    Name         stdout
    Match        *
    Format       json_lines
